<%
# Usage:
#   mux agent                        -> session "agent",      root ~/dev/
#   mux agent BBCEEP-1234            -> session "agent-BBCEEP-1234"
#   mux agent cleanup-old-flags      -> session "agent-cleanup-old-flags"
#   mux agent BBCEEP-1234 root=PATH  -> root override (else ~/dev/)
#
# `label` is freeform: a Jira key, a short slug, or anything tmux accepts as a
# session name. Once a ticket exists, agents can rename their session via
# `tmux rename-session -t <old> agent-<TICKET>` so the WORKING_STATE board and
# session name stay in sync.
label = @args[0].to_s.strip
name  = label.empty? ? "agent" : "agent-#{label}"
root  = (@settings["root"] || "~/dev/").to_s
%>
name: <%= name %>
root: <%= root %>

windows:
  - zsh:
  - vim: vim
  - ai: opencode
